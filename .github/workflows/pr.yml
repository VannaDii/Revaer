name: PR

on:
  pull_request:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "lts/*"
  IMAGE_NAME: revaer

jobs:
  # Quick formatting check that can run in parallel
  fmt:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          components: rustfmt

      - name: Format
        run: just fmt

  lint:
    name: Check Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          components: clippy
          apt-profile: base

      - name: Lint
        run: just lint

  check:
    name: Run Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Check
        run: just check

  coverage:
    name: Check Coverage
    runs-on: ubuntu-latest
    needs: [test]
    env:
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: db

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.REVAER_TEST_DATABASE_URL }}
        run: just db-migrate

      - name: Coverage
        run: just cov

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    env:
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: db

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.REVAER_TEST_DATABASE_URL }}
        run: just db-migrate

      - name: Test
        run: just test

  native-it:
    name: Native Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    env:
      REVAER_NATIVE_IT: "1"
      DOCKER_HOST: unix:///var/run/docker.sock
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Native integration tests
        run: just test-native

  feature-matrix:
    name: Feature Matrix
    runs-on: ubuntu-latest
    needs: [test]
    env:
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: db

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.REVAER_TEST_DATABASE_URL }}
        run: just db-migrate

      - name: Feature matrix tests (no default features)
        run: just test-features-min

  ui-e2e:
    name: UI E2E (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    needs: [test]
    env:
      E2E_API_BASE_URL: http://localhost:7070
      E2E_BASE_URL: http://localhost:8080
      E2E_DB_ADMIN_URL: postgres://revaer:revaer@localhost:5432/postgres
      E2E_SKIP_DB_START: "1"
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      PLAYWRIGHT_SHARD_INDEX: ${{ matrix.shard }}
      PLAYWRIGHT_SHARD_TOTAL: 3
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          apt-profile: db

      - name: UI E2E
        run: just ui-e2e

      - name: Upload E2E coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-coverage-shard-${{ matrix.shard }}
          path: |
            tests/test-results/api-coverage-*.json
            tests/test-results/ui-coverage-*.json
          if-no-files-found: warn

  ui-e2e-coverage:
    name: UI E2E Coverage
    runs-on: ubuntu-latest
    needs: ui-e2e
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Download E2E coverage
        uses: actions/download-artifact@v4
        with:
          pattern: ui-e2e-coverage-shard-*
          path: tests/test-results
          merge-multiple: true

      - name: UI E2E coverage
        run: just ui-e2e-coverage

  load-matrix:
    name: Load Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - id: sha
        shell: bash
        run: |
          set -euo pipefail
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - id: out
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "matrix<<EOF"
            cat .github/matrices/build-images.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-pr-images:
    name: Build PR Images
    needs: [ui-e2e-coverage, load-matrix]
    if: github.event.pull_request.head.repo.fork == false
    uses: ./.github/workflows/build-images.yml
    permissions:
      contents: read
      packages: write
    with:
      matrix: ${{ needs.load-matrix.outputs.matrix }}
      image_name: ${{ env.IMAGE_NAME }}
      version_tag: pr-${{ github.event.pull_request.number }}-${{ needs.load-matrix.outputs.short_sha }}
      alias_tag: pr-${{ github.event.pull_request.number }}
      include_sha_tag: false
      checkout_ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  audit:
    name: Run Audit
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Audit
        run: just audit

  deny:
    name: Check Deny
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Deny
        run: just deny

  udeps:
    name: Check Unused Deps
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Unused Deps
        run: just udeps

  build-release:
    name: Build Release
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      [
        coverage,
        audit,
        deny,
        udeps,
        test,
        native-it,
        feature-matrix,
        ui-e2e-coverage,
      ]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Build release
        run: just build-release
