name: Helm OCI Verify

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: Optional chart version override for manual verification.
        required: false
        type: string
      app_version:
        description: Optional app version override for manual verification.
        required: false
        type: string

concurrency:
  group: helm-oci-verify-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-helm-oci:
    name: Verify Helm OCI Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Set up Helm
        uses: Azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.0

      - name: Set up ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: 1.3.1

      - name: Resolve verification versions
        id: versions
        env:
          INPUT_CHART_VERSION: ${{ inputs.chart_version }}
          INPUT_APP_VERSION: ${{ inputs.app_version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          validate_chart_version() {
            local value="$1"
            if [[ ! "${value}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid chart_version '${value}'. Expected a SemVer-compatible Helm chart version." >&2
              exit 1
            fi
          }

          validate_app_version() {
            local value="$1"
            if [[ ! "${value}" =~ ^[0-9A-Za-z._+-]+$ ]]; then
              echo "Invalid app_version '${value}'. Expected only ASCII letters, digits, dot, underscore, plus, or hyphen." >&2
              exit 1
            fi
          }

          write_output() {
            local key="$1"
            local value="$2"
            local delimiter="EOF_${key}_$(uuidgen | tr '[:lower:]' '[:upper:]')"
            {
              printf '%s<<%s\n' "${key}" "${delimiter}"
              printf '%s\n' "${value}"
              printf '%s\n' "${delimiter}"
            } >> "${GITHUB_OUTPUT}"
          }

          chart_version="${INPUT_CHART_VERSION}"
          app_version="${INPUT_APP_VERSION}"
          pr_number="$(gh api "repos/${GITHUB_REPOSITORY}/pulls?head=${GITHUB_REPOSITORY_OWNER}:${GITHUB_REF_NAME}&state=open" --jq '.[0].number // empty')"

          if [ -z "${chart_version}" ]; then
            if [ -z "${pr_number}" ]; then
              echo "Unable to resolve an open PR number for ${GITHUB_REF_NAME}; provide chart_version explicitly." >&2
              exit 1
            fi
            chart_version="0.0.0-dev.pr${pr_number}.${GITHUB_RUN_NUMBER}"
          fi

          if [ -z "${app_version}" ]; then
            if [ -n "${pr_number}" ]; then
              app_version="pr-${pr_number}-${GITHUB_SHA::7}"
            else
              app_version="verify-${GITHUB_SHA::7}"
            fi
          fi

          validate_chart_version "${chart_version}"
          validate_app_version "${app_version}"

          write_output "pr_number" "${pr_number}"
          write_output "chart_version" "${chart_version}"
          write_output "app_version" "${app_version}"

      - name: Package Helm chart
        env:
          CHART_VERSION: ${{ steps.versions.outputs.chart_version }}
          APP_VERSION: ${{ steps.versions.outputs.app_version }}
          HELM_GPG_PRIVATE: ${{ secrets.HELM_GPG_PRIVATE }}
          HELM_GPG_PUBLIC: ${{ secrets.HELM_GPG_PUBLIC }}
          ARTIFACTHUB_REPOSITORY_ID: ${{ vars.ARTIFACTHUB_REPOSITORY_ID }}
          ARTIFACTHUB_OWNER_NAME: ${{ vars.ARTIFACTHUB_OWNER_NAME }}
          ARTIFACTHUB_OWNER_EMAIL: ${{ vars.ARTIFACTHUB_OWNER_EMAIL }}
        run: |
          set -euo pipefail
          just helm-package "${CHART_VERSION}" "${APP_VERSION}"

      - name: Publish Helm chart
        env:
          CHART_VERSION: ${{ steps.versions.outputs.chart_version }}
          APP_VERSION: ${{ steps.versions.outputs.app_version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HELM_REGISTRY_USERNAME: ${{ github.actor }}
          HELM_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          REVAER_HELM_SKIP_PACKAGE: "1"
        run: |
          set -euo pipefail
          just helm-publish "${CHART_VERSION}" "${APP_VERSION}"
