name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "lts/*"
  IMAGE_NAME: revaer

x-run-guard: &run_guard ${{ github.ref == 'refs/heads/main' || (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')) }}

jobs:
  # Quick formatting check that can run in parallel
  fmt:
    name: Check Formatting
    runs-on: ubuntu-latest
    if: *run_guard
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          components: rustfmt

      - name: Format
        run: just fmt

  lint:
    name: Check Lint
    runs-on: ubuntu-latest
    if: *run_guard
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          components: clippy
          apt-profile: base

      - name: Lint
        run: just lint

  check:
    name: Run Checks
    runs-on: ubuntu-latest
    if: *run_guard
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Check
        run: just check

  coverage:
    name: Check Coverage
    runs-on: ubuntu-latest
    needs: [test]
    env:
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: db

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.REVAER_TEST_DATABASE_URL }}
        run: just db-migrate

      - name: Coverage
        run: just cov

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    env:
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: db

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.REVAER_TEST_DATABASE_URL }}
        run: just db-migrate

      - name: Test
        run: just test

  native-it:
    name: Native Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    env:
      REVAER_NATIVE_IT: "1"
      DOCKER_HOST: unix:///var/run/docker.sock
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Native integration tests
        run: just test-native

  feature-matrix:
    name: Feature Matrix
    runs-on: ubuntu-latest
    needs: [test]
    env:
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: db

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.REVAER_TEST_DATABASE_URL }}
        run: just db-migrate

      - name: Feature matrix tests (no default features)
        run: just test-features-min

  ui-e2e:
    name: UI E2E (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    needs: [test]
    env:
      E2E_API_BASE_URL: http://localhost:7070
      E2E_BASE_URL: http://localhost:8080
      E2E_DB_ADMIN_URL: postgres://revaer:revaer@localhost:5432/postgres
      E2E_SKIP_DB_START: "1"
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      PLAYWRIGHT_SHARD_INDEX: ${{ matrix.shard }}
      PLAYWRIGHT_SHARD_TOTAL: 3
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          apt-profile: db

      - name: UI E2E
        run: just ui-e2e

      - name: Upload E2E coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-coverage-shard-${{ matrix.shard }}
          path: |
            tests/test-results/api-coverage-*.json
            tests/test-results/ui-coverage-*.json
          if-no-files-found: warn

  ui-e2e-coverage:
    name: UI E2E Coverage
    runs-on: ubuntu-latest
    needs: ui-e2e
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Download E2E coverage
        uses: actions/download-artifact@v4
        with:
          pattern: ui-e2e-coverage-shard-*
          path: tests/test-results
          merge-multiple: true

      - name: UI E2E coverage
        run: just ui-e2e-coverage

  audit:
    name: Run Audit
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Audit
        run: just audit

  deny:
    name: Check Deny
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Deny
        run: just deny

  udeps:
    name: Check Unused Deps
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Unused Deps
        run: just udeps

  build-release:
    name: Build Release
    if: github.ref == 'refs/heads/main' || (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-'))
    runs-on: ubuntu-latest
    needs:
      [
        coverage,
        audit,
        deny,
        udeps,
        test,
        native-it,
        feature-matrix,
        ui-e2e-coverage,
      ]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Build release artifacts
        run: just release-artifacts

      - name: Push Short SHA to ENV
        run: |
          github_sha_hash=${{ github.sha }}
          github_sha_short="${github_sha_hash:0:7}"
          echo "RELEASE_SHA_SHORT=${github_sha_short}" >> $GITHUB_ENV

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: revaer-release-${{ env.RELEASE_SHA_SHORT }}
          path: dist

  release-dev:
    name: Publish Dev Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.release-info.outputs.tag }}
      release_version: ${{ steps.release-info.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Push Short SHA to ENV
        run: |
          github_sha_hash=${{ github.sha }}
          github_sha_short="${github_sha_hash:0:7}"
          echo "RELEASE_SHA_SHORT=${github_sha_short}" >> $GITHUB_ENV

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: revaer-release-${{ env.RELEASE_SHA_SHORT }}
          path: dist

      - name: Publish dev release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just release-dev

      - name: Read release info
        id: release-info
        run: |
          if [ ! -f release/next-release.json ]; then
            echo "Missing release/next-release.json; no dev release was created." >&2
            exit 1
          fi
          tag=$(node -p "require('./release/next-release.json').gitTag")
          version=$(node -p "require('./release/next-release.json').version")
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-release
    # Only create a release for tags like refs/tags/v1.2.3
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')

    permissions:
      contents: write # needed to create a release

    steps:
      - name: Push Short SHA to ENV
        run: |
          github_sha_hash=${{ github.sha }}
          github_sha_short="${github_sha_hash:0:7}"
          echo "RELEASE_SHA_SHORT=${github_sha_short}" >> $GITHUB_ENV

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: revaer-release-${{ env.RELEASE_SHA_SHORT }}
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Revaer ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/revaer-app
            dist/revaer-app.sha256
            dist/openapi.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  load-matrix:
    name: Load Matrix
    runs-on: ubuntu-latest
    needs: build-release
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: out
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            {
              echo "matrix<<EOF"
              cat .github/matrices/build-images.json
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* && "${GITHUB_REF_NAME}" != *-* ]]; then
            {
              echo "matrix<<EOF"
              cat .github/matrices/build-images.json
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          fi

  build-images:
    name: Build Images
    needs: [load-matrix, release-dev]
    if: |
      (github.ref == 'refs/heads/main' &&
        needs.release-dev.result == 'success' &&
        needs.load-matrix.result == 'success') ||
      (startsWith(github.ref, 'refs/tags/') &&
        !contains(github.ref_name, '-') &&
        needs.load-matrix.result == 'success')
    uses: ./.github/workflows/build-images.yml
    with:
      matrix: ${{ needs.load-matrix.outputs.matrix }}
      image_name: ${{ env.IMAGE_NAME }}
      version_tag: >-
        ${{ needs.release-dev.outputs.release_tag != '' &&
            needs.release-dev.outputs.release_tag ||
            github.ref_name }}
      alias_tag: ${{ github.ref == 'refs/heads/main' && 'dev' || 'latest' }}
      include_sha_tag: true
    secrets: inherit
