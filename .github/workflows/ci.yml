name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "lts/*"

jobs:
  # Quick formatting check that can run in parallel
  fmt:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          components: rustfmt

      - name: Format
        run: just fmt

  lint:
    name: Check Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          components: clippy
          apt-profile: base

      - name: Lint
        run: just lint

  check:
    name: Run Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Check
        run: just check

  coverage:
    name: Check Coverage
    runs-on: ubuntu-latest
    needs: [test]
    env:
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: db

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.REVAER_TEST_DATABASE_URL }}
        run: just db-migrate

      - name: Coverage
        run: just cov

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    env:
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: db

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.REVAER_TEST_DATABASE_URL }}
        run: just db-migrate

      - name: Test
        run: just test

  native-it:
    name: Native Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    env:
      REVAER_NATIVE_IT: "1"
      DOCKER_HOST: unix:///var/run/docker.sock
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Native integration tests
        run: just test-native

  feature-matrix:
    name: Feature Matrix
    runs-on: ubuntu-latest
    needs: [test]
    env:
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: db

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.REVAER_TEST_DATABASE_URL }}
        run: just db-migrate

      - name: Feature matrix tests (no default features)
        run: just test-features-min

  ui-e2e:
    name: UI E2E (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    needs: [test]
    env:
      E2E_API_BASE_URL: http://localhost:7070
      E2E_BASE_URL: http://localhost:8080
      E2E_DB_ADMIN_URL: postgres://revaer:revaer@localhost:5432/postgres
      E2E_SKIP_DB_START: "1"
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      PLAYWRIGHT_SHARD_INDEX: ${{ matrix.shard }}
      PLAYWRIGHT_SHARD_TOTAL: 3
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          apt-profile: db

      - name: UI E2E
        run: just ui-e2e

  audit:
    name: Run Audit
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Audit
        run: just audit

  deny:
    name: Check Deny
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Deny
        run: just deny

  udeps:
    name: Check Unused Deps
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Unused Deps
        run: just udeps

  build-release:
    name: Build Release
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      [coverage, audit, deny, udeps, test, native-it, feature-matrix, ui-e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Build release
        run: just build-release

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-release
    # Only create a release for tags like refs/tags/v1.2.3
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write # needed to create a release

    steps:
      - name: Push Short SHA to ENV
        run: |
          github_sha_hash=${{ github.sha }}
          github_sha_short="${github_sha_hash:0:7}"
          echo "RELEASE_SHA_SHORT=${github_sha_short}" >> $GITHUB_ENV

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: revaer-release-${{ env.RELEASE_SHA_SHORT }}
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Revaer ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/revaer-app
            dist/revaer-app.sha256
            dist/openapi.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  load-matrix:
    name: Load Matrix
    runs-on: ubuntu-latest
    needs: build-release
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: out
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == refs/tags/* ]]; then
            {
              echo "matrix<<EOF"
              cat .github/matrices/build-images.json
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          fi

  # Docker build and scan (only on main branch or tags)
  build-images:
    name: Build & Push ${{ matrix.name }}
    needs: load-matrix
    # Publish images for main and tags; tags use the release image name.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    strategy:
      matrix: ${{ fromJSON(needs.load-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.needs_qemu == true
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Name
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "IMAGE_ALIAS_TAG=latest" >> "$GITHUB_ENV"
          else
            echo "IMAGE_ALIAS_TAG=dev" >> "$GITHUB_ENV"
          fi

      - name: Build & Push Image
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH_TAG: ${{ matrix.arch_tag }}
        run: |
          set -euo pipefail

          GIT_SHA_SHORT=$(git rev-parse --short HEAD)
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_BASE="ghcr.io/${REPO_OWNER}/${IMAGE_NAME}"
          IMAGE_TAG="${IMAGE_BASE}:${GIT_SHA_SHORT}-${ARCH_TAG}"
          RUST_TARGET="${{ matrix.rust_target }}"
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION="${GITHUB_REF_NAME}"
          REVISION="${GIT_SHA_SHORT}"

          echo "Building ${IMAGE_TAG} for ${PLATFORM}"

          docker buildx build \
            --platform "${PLATFORM}" \
            -t "${IMAGE_TAG}" \
            --push \
            --build-arg RUST_TARGET="${RUST_TARGET}" \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            --build-arg VERSION="${VERSION}" \
            --build-arg REVISION="${REVISION}" \
            .

  create-multiarch-manifest:
    name: Multi-arch Manifest
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Select image name
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "IMAGE_ALIAS_TAG=latest" >> "$GITHUB_ENV"
          else
            echo "IMAGE_ALIAS_TAG=dev" >> "$GITHUB_ENV"
          fi

      - name: Create and push multi-arch manifest
        run: |
          set -euo pipefail

          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_BASE="ghcr.io/${REPO_OWNER}/${IMAGE_NAME}"


          GIT_SHA_SHORT=$(git rev-parse --short HEAD)
          AMD64_TAG="${IMAGE_BASE}:${GIT_SHA_SHORT}-amd64"
          ARM64_TAG="${IMAGE_BASE}:${GIT_SHA_SHORT}-arm64"

          # Digest-based tag
          SHA_TAG="${IMAGE_BASE}:${GIT_SHA_SHORT}"

          ALIAS_TAG="${IMAGE_BASE}:${IMAGE_ALIAS_TAG}"

          echo "Will create multi-arch manifest for:"
          echo "  ${SHA_TAG}"
          echo "  ${ALIAS_TAG}"
          echo "Using:"
          echo "  ${AMD64_TAG}"
          echo "  ${ARM64_TAG}"

          TAG_ARGS="-t ${SHA_TAG}"
          TAG_ARGS="${TAG_ARGS} -t ${ALIAS_TAG}"

          docker buildx imagetools create \
            ${TAG_ARGS} \
            "${AMD64_TAG}" \
            "${ARM64_TAG}"
