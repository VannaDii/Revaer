name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "lts/*"
  IMAGE_NAME: revaer

jobs:
  instruction-drift:
    name: Check Instruction Drift
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Instruction drift
        env:
          REVAER_INSTRUCTION_DIFF_BASE: ${{ github.event.before }}
          REVAER_INSTRUCTION_DIFF_HEAD: ${{ github.sha }}
        run: just instruction-drift

  # Quick formatting check that can run in parallel
  fmt:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          components: rustfmt

      - name: Format
        run: just fmt

  lint:
    name: Check Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          components: clippy
          apt-profile: base

      - name: Lint
        run: just lint

  check:
    name: Run Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Check
        run: just check

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Set up Helm
        uses: Azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.0

      - name: Helm lint
        run: just helm-lint

  coverage:
    name: Check Coverage
    runs-on: ubuntu-latest
    needs: [test]
    env:
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: db

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.REVAER_TEST_DATABASE_URL }}
        run: just db-migrate

      - name: Coverage
        run: just cov

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [fmt, lint, check, helm-lint]
    env:
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: db

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.REVAER_TEST_DATABASE_URL }}
        run: just db-migrate

      - name: Test
        run: just test

  native-it:
    name: Native Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    env:
      REVAER_NATIVE_IT: "1"
      DOCKER_HOST: unix:///var/run/docker.sock
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Native integration tests
        run: just test-native

  feature-matrix:
    name: Feature Matrix
    runs-on: ubuntu-latest
    needs: [test]
    env:
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: db

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.REVAER_TEST_DATABASE_URL }}
        run: just db-migrate

      - name: Feature matrix tests (no default features)
        run: just test-features-min

  ui-e2e:
    name: UI E2E (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    needs: [test]
    env:
      E2E_API_BASE_URL: http://localhost:7070
      E2E_BASE_URL: http://localhost:8080
      E2E_DB_ADMIN_URL: postgres://revaer:revaer@localhost:5432/postgres
      E2E_SKIP_DB_START: "1"
      REVAER_TEST_DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      DATABASE_URL: ${{ vars.REVAER_DATABASE_URL}}
      PLAYWRIGHT_SHARD_INDEX: ${{ matrix.shard }}
      PLAYWRIGHT_SHARD_TOTAL: 3
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revaer
          POSTGRES_PASSWORD: revaer
          POSTGRES_DB: revaer
        options: >-
          --health-cmd="pg_isready -U revaer -d revaer"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          apt-profile: db

      - name: UI E2E
        run: just ui-e2e

      - name: Upload E2E coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ui-e2e-coverage-shard-${{ matrix.shard }}
          path: |
            tests/test-results/api-coverage-*.json
            tests/test-results/ui-coverage-*.json
          if-no-files-found: warn

  ui-e2e-coverage:
    name: UI E2E Coverage
    runs-on: ubuntu-latest
    needs: ui-e2e
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Download E2E coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ui-e2e-coverage-shard-*
          path: tests/test-results
          merge-multiple: true

      - name: UI E2E coverage
        run: just ui-e2e-coverage

  audit:
    name: Run Audit
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Audit
        run: just audit

  deny:
    name: Check Deny
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Deny
        run: just deny

  udeps:
    name: Check Unused Deps
    runs-on: ubuntu-latest
    needs: [fmt, lint, check]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Unused Deps
        run: just udeps

  build-release:
    name: Build Release
    if: github.ref == 'refs/heads/main' || (startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-'))
    runs-on: ubuntu-latest
    needs:
      - coverage
      - audit
      - deny
      - udeps
      - helm-lint
      - test
      - native-it
      - feature-matrix
      - ui-e2e-coverage
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          apt-profile: base

      - name: Build release artifacts
        run: just release-artifacts

      - name: Push Short SHA to ENV
        run: |
          github_sha_hash=${{ github.sha }}
          github_sha_short="${github_sha_hash:0:7}"
          echo "RELEASE_SHA_SHORT=${github_sha_short}" >> $GITHUB_ENV

      - name: Upload release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: revaer-release-${{ env.RELEASE_SHA_SHORT }}
          path: dist

  release-dev:
    name: Publish Dev Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.release-info.outputs.tag }}
      release_version: ${{ steps.release-info.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Helm
        uses: Azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.0

      - name: Push Short SHA to ENV
        run: |
          github_sha_hash=${{ github.sha }}
          github_sha_short="${github_sha_hash:0:7}"
          echo "RELEASE_SHA_SHORT=${github_sha_short}" >> $GITHUB_ENV

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: revaer-release-${{ env.RELEASE_SHA_SHORT }}
          path: dist

      - name: Publish dev release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVAER_ENABLE_HELM_RELEASE_ASSETS: "1"
          HELM_GPG_PRIVATE: ${{ secrets.HELM_GPG_PRIVATE }}
          HELM_GPG_PUBLIC: ${{ secrets.HELM_GPG_PUBLIC }}
          ARTIFACTHUB_REPOSITORY_ID: ${{ vars.ARTIFACTHUB_REPOSITORY_ID }}
          ARTIFACTHUB_OWNER_NAME: ${{ vars.ARTIFACTHUB_OWNER_NAME }}
          ARTIFACTHUB_OWNER_EMAIL: ${{ vars.ARTIFACTHUB_OWNER_EMAIL }}
        run: just release-dev

      - name: Read release info
        id: release-info
        run: |
          if [ ! -f release/next-release.json ]; then
            echo "Missing release/next-release.json; no dev release was created." >&2
            exit 1
          fi
          tag=$(node -p "require('./release/next-release.json').gitTag")
          version=$(node -p "require('./release/next-release.json').version")
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Upload Helm release assets
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: revaer-helm-${{ steps.release-info.outputs.tag }}
          path: dist/helm

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-release
    # Only create a release for tags like refs/tags/v1.2.3
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')

    permissions:
      contents: write # needed to create a release

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Set up Helm
        uses: Azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.0

      - name: Push Short SHA to ENV
        run: |
          github_sha_hash=${{ github.sha }}
          github_sha_short="${github_sha_hash:0:7}"
          echo "RELEASE_SHA_SHORT=${github_sha_short}" >> $GITHUB_ENV

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: revaer-release-${{ env.RELEASE_SHA_SHORT }}
          path: dist

      - name: Package Helm chart
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          HELM_GPG_PRIVATE: ${{ secrets.HELM_GPG_PRIVATE }}
          HELM_GPG_PUBLIC: ${{ secrets.HELM_GPG_PUBLIC }}
          ARTIFACTHUB_REPOSITORY_ID: ${{ vars.ARTIFACTHUB_REPOSITORY_ID }}
          ARTIFACTHUB_OWNER_NAME: ${{ vars.ARTIFACTHUB_OWNER_NAME }}
          ARTIFACTHUB_OWNER_EMAIL: ${{ vars.ARTIFACTHUB_OWNER_EMAIL }}
        run: |
          set -euo pipefail
          chart_version="${RELEASE_TAG#v}"
          just helm-package "${chart_version}" "${RELEASE_TAG}"

      - name: Upload Helm release assets
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: revaer-helm-${{ github.ref_name }}
          path: dist/helm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: Revaer ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            dist/revaer-app
            dist/revaer-app.sha256
            dist/openapi.json
            dist/helm/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-dev-helm:
    name: Publish Dev Helm Chart
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: release-dev
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Set up Helm
        uses: Azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.0

      - name: Set up ORAS
        uses: oras-project/setup-oras@ca28077386065e263c03428f4ae0c09024817c93 # v1.2.0
        with:
          version: 1.2.2

      - name: Download Helm release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: revaer-helm-${{ needs.release-dev.outputs.release_tag }}
          path: dist/helm

      - name: Publish dev Helm chart
        env:
          RELEASE_VERSION: ${{ needs.release-dev.outputs.release_version }}
          RELEASE_TAG: ${{ needs.release-dev.outputs.release_tag }}
          HELM_API_KEY_ID: ${{ secrets.HELM_API_KEY_ID }}
          HELM_API_KEY_SECRET: ${{ secrets.HELM_API_KEY_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_VERSION}" ] || [ -z "${RELEASE_TAG}" ]; then
            echo "Missing dev release version or tag." >&2
            exit 1
          fi
          REVAER_HELM_SKIP_PACKAGE=1 just helm-publish "${RELEASE_VERSION}" "${RELEASE_TAG}"

  publish-release-helm:
    name: Publish Release Helm Chart
    runs-on: ubuntu-latest
    needs: publish-release
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-revaer
        with:
          toolchain: ${{ vars.RUST_TOOLCHAIN_VERSION }}

      - name: Set up Helm
        uses: Azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.0

      - name: Set up ORAS
        uses: oras-project/setup-oras@ca28077386065e263c03428f4ae0c09024817c93 # v1.2.0
        with:
          version: 1.2.2

      - name: Download Helm release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: revaer-helm-${{ github.ref_name }}
          path: dist/helm

      - name: Publish release Helm chart
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          HELM_API_KEY_ID: ${{ secrets.HELM_API_KEY_ID }}
          HELM_API_KEY_SECRET: ${{ secrets.HELM_API_KEY_SECRET }}
        run: |
          set -euo pipefail
          chart_version="${RELEASE_TAG#v}"
          REVAER_HELM_SKIP_PACKAGE=1 just helm-publish "${chart_version}" "${RELEASE_TAG}"

  load-matrix:
    name: Load Matrix
    runs-on: ubuntu-latest
    needs: build-release
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: out
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            {
              echo "matrix<<EOF"
              cat .github/matrices/build-images.json
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* && "${GITHUB_REF_NAME}" != *-* ]]; then
            {
              echo "matrix<<EOF"
              cat .github/matrices/build-images.json
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          fi

  build-images:
    name: Build Images
    needs: [load-matrix, release-dev]
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    if: |
      (github.ref == 'refs/heads/main' &&
        needs.release-dev.result == 'success' &&
        needs.load-matrix.result == 'success') ||
      (startsWith(github.ref, 'refs/tags/') &&
        !contains(github.ref_name, '-') &&
        needs.load-matrix.result == 'success')
    uses: ./.github/workflows/build-images.yml
    with:
      matrix: ${{ needs.load-matrix.outputs.matrix }}
      image_name: revaer
      version_tag: >-
        ${{ needs.release-dev.outputs.release_tag != '' &&
            needs.release-dev.outputs.release_tag ||
            github.ref_name }}
      alias_tag: ${{ github.ref == 'refs/heads/main' && 'dev' || 'latest' }}
      include_sha_tag: true
    secrets: inherit
