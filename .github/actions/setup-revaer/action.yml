name: Setup Revaer
description: Install Rust toolchain, just, optional Node.js, and apt packages.
inputs:
  toolchain:
    description: Rust toolchain version to install.
    required: true
  components:
    description: Rust components to install (comma-separated).
    required: false
    default: ""
  apt-packages:
    description: Apt packages to install (space-separated).
    required: false
    default: ""
  apt-profile:
    description: Predefined apt package set (base, db).
    required: false
    default: ""
  node-version:
    description: Node.js version to install.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Cache Rust artifacts
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ~/.cache/sccache
        key: ${{ runner.os }}-cargo-${{ inputs.toolchain }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ inputs.toolchain }}-${{ github.job }}-
          ${{ runner.os }}-cargo-${{ inputs.toolchain }}-

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    - name: Install just
      uses: taiki-e/install-action@cd39cb0572834c149bf3533a143f05e09def0f3c # v2.62.2
      with:
        tool: just

    - name: Install Node.js
      if: ${{ inputs.node-version != '' }}
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: tests/package-lock.json

    - name: Install apt packages
      shell: bash
      env:
        INPUT_APT_PACKAGES: ${{ inputs.apt-packages }}
        INPUT_APT_PROFILE: ${{ inputs.apt-profile }}
      run: |
        set -euo pipefail

        declare -a packages=()

        if [ -n "${INPUT_APT_PACKAGES}" ]; then
          read -r -a packages <<<"${INPUT_APT_PACKAGES}"
        else
          case "${INPUT_APT_PROFILE}" in
            base)
              packages=(libtorrent-rasterbar-dev pkg-config sccache)
              ;;
            db)
              packages=(libtorrent-rasterbar-dev pkg-config libpq-dev postgresql-client sccache)
              ;;
            "")
              packages=()
              ;;
            *)
              echo "Unknown apt profile: ${INPUT_APT_PROFILE}" >&2
              exit 1
              ;;
          esac
        fi

        if [ "${#packages[@]}" -eq 0 ]; then
          exit 0
        fi

        for package in "${packages[@]}"; do
          case "${package}" in
            [A-Za-z0-9.+:-]*)
              ;;
            *)
              echo "Invalid apt package token: ${package}" >&2
              exit 1
              ;;
          esac
        done

        sudo apt-get update
        sudo apt-get install -y "${packages[@]}"

    - name: Configure sccache
      shell: bash
      run: |
        if command -v sccache >/dev/null 2>&1; then
          mkdir -p "${HOME}/.cache/sccache"
          echo "RUSTC_WRAPPER=sccache" >> "${GITHUB_ENV}"
          echo "SCCACHE_DIR=${HOME}/.cache/sccache" >> "${GITHUB_ENV}"
          echo "SCCACHE_CACHE_SIZE=5G" >> "${GITHUB_ENV}"
        fi
