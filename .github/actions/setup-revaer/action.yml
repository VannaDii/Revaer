name: Setup Revaer
description: Install Rust toolchain, just, optional Node.js, and apt packages.
inputs:
  toolchain:
    description: Rust toolchain version to install.
    required: true
  components:
    description: Rust components to install (comma-separated).
    required: false
    default: ""
  apt-packages:
    description: Apt packages to install (space-separated).
    required: false
    default: ""
  apt-profile:
    description: Predefined apt package set (base, db).
    required: false
    default: ""
  node-version:
    description: Node.js version to install.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    - name: Install just
      uses: taiki-e/install-action@just

    - name: Install Node.js
      if: ${{ inputs.node-version != '' }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install apt packages
      shell: bash
      run: |
        set -euo pipefail

        packages="${{ inputs.apt-packages }}"
        if [ -z "${packages}" ]; then
          case "${{ inputs.apt-profile }}" in
            base)
              packages="libtorrent-rasterbar-dev pkg-config"
              ;;
            db)
              packages="libtorrent-rasterbar-dev pkg-config libpq-dev postgresql-client"
              ;;
            "")
              packages=""
              ;;
            *)
              echo "Unknown apt profile: ${{ inputs.apt-profile }}" >&2
              exit 1
              ;;
          esac
        fi

        if [ -n "${packages}" ]; then
          sudo apt-get update
          sudo apt-get install -y ${packages}
        fi
