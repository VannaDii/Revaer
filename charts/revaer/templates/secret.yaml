{{- if and (not .Values.database.existingSecret) .Values.database.url -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "revaer.databaseSecretName" . }}
  labels:
    {{- include "revaer.labels" . | nindent 4 }}
  {{- with .Values.database.secretAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.database.secretKey }}: {{ .Values.database.url | quote }}
{{- end }}
