replicaCount: 1

image:
  repository: ghcr.io/vannadii/revaer
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

database:
  url: ""
  existingSecret: ""
  secretKey: DATABASE_URL
  secretAnnotations: {}

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  annotations: {}
  apiPort: 7070
  uiPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: revaer.local
      paths:
        - path: /
          pathType: Prefix
          servicePort: ui
  tls: []

resources: {}

configPersistence:
  enabled: false
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  storageClassName: ""
  existingClaim: ""
  annotations: {}

dataPersistence:
  enabled: false
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClassName: ""
  existingClaim: ""
  annotations: {}

extraEnv: []
extraEnvFrom: []

nodeSelector: {}
tolerations: []
affinity: {}
